<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2 - Formulario DOM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav><a href="index.html">← Volver al Inicio</a></nav>
    <h1>Registro de Personas (JavaScript Vanilla)</h1>

    <form id="persona-form">
        <div><label>Nombre:</label><input type="text" id="nombre" required></div>
        <div><label>Apellido:</label><input type="text" id="apellido" required></div>
        <div><label>Edad:</label><input type="number" id="edad" required></div>
        <div><label>Altura (m):</label><input type="number" step="0.01" id="altura" required></div>
        <div><label>Peso (kg):</label><input type="number" step="0.1" id="peso" required></div>
        <button type="submit">Agregar Persona</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th><th>Apellido</th><th>Edad</th><th>Altura</th><th>Peso</th><th>IMC</th><th>Acción</th>
            </tr>
        </thead>
        <tbody id="tabla-personas"></tbody>
    </table>

    <script>
        const form = document.getElementById('persona-form');
        const tabla = document.getElementById('tabla-personas');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const apellido = document.getElementById('apellido').value;
            const edad = document.getElementById('edad').value;
            const altura = parseFloat(document.getElementById('altura').value);
            const peso = parseFloat(document.getElementById('peso').value);

            // Fórmula: $IMC = \frac{peso}{altura^2}$
            const imc = (peso / (altura * altura)).toFixed(2);

            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td>${nombre}</td>
                <td>${apellido}</td>
                <td>${edad}</td>
                <td>${altura} m</td>
                <td>${peso} kg</td>
                <td><strong>${imc}</strong></td>
                <td><button class="delete-btn">Quitar</button></td>
            `;

            fila.querySelector('.delete-btn').addEventListener('click', () => fila.remove());
            tabla.appendChild(fila);
            form.reset();
        });
    </script>
</body>
</html>
